name: CI

on:
  push:
    branches: [main]
    paths:
      - "main/**"
      - "components/**"
      - "CMakeLists.txt"
      - "sdkconfig.defaults"
      - ".github/workflows/**"
      - "diagram.json"
      - "wokwi.toml"
  pull_request:
    paths:
      - "main/**"
      - "components/**"
      - "CMakeLists.txt"
      - "sdkconfig.defaults"
      - ".github/workflows/**"
      - "diagram.json"
      - "wokwi.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate credentials.h from secrets
        run: |
          sed \
            -e "s/your_network_name/${{ secrets.WIFI_SSID }}/" \
            -e "s/your_password/${{ secrets.WIFI_PASS }}/" \
            main/credentials.h.example > main/credentials.h

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.2
          target: esp32s3
          command: bash -c "idf.py build && idf.py merge-bin -o merged-firmware.bin"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/merged-firmware.bin

  simulate:
    name: Wokwi simulation
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: .

      - name: Install wokwi-cli
        run: |
          wget -q -O /usr/local/bin/wokwi-cli \
            https://github.com/wokwi/wokwi-cli/releases/latest/download/wokwi-cli-linuxstatic-x64
          chmod +x /usr/local/bin/wokwi-cli
          wokwi-cli --version

      - name: Run Wokwi simulation
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          wokwi-cli --timeout 30000 \
            --expect-text "Fresnel Beacon starting" \
            --serial-log-file wokwi-serial.log \
            .

      - name: Upload serial log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wokwi-serial-log
          path: wokwi-serial.log
