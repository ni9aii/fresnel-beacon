name: CI

on:
  push:
    branches: [main]
    paths:
      - "main/**"
      - "components/**"
      - "CMakeLists.txt"
      - "sdkconfig.defaults"
      - ".github/workflows/**"
      - "diagram.json"
      - "wokwi.toml"
      - "scenario.yaml"
  pull_request:
    paths:
      - "main/**"
      - "components/**"
      - "CMakeLists.txt"
      - "sdkconfig.defaults"
      - ".github/workflows/**"
      - "diagram.json"
      - "wokwi.toml"
      - "scenario.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate credentials.h from secrets
        run: |
          sed \
            -e "s/your_network_name/${{ secrets.WIFI_SSID }}/" \
            -e "s/your_password/${{ secrets.WIFI_PASS }}/" \
            main/credentials.h.example > main/credentials.h

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.2
          target: esp32s3
          command: idf.py build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/fresnel-beacon.bin
            build/fresnel-beacon.elf

  simulate:
    name: Wokwi simulation
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: .

      - name: List downloaded files
        run: find . -maxdepth 3 \( -name "*.bin" -o -name "*.elf" \) | sort

      - name: Run Wokwi simulation
        uses: wokwi/wokwi-ci-action@v1.2.0
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          timeout: 30000
          expect_text: "Fresnel Beacon starting"
          serial_log_file: wokwi-serial.log

      - name: Upload serial log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wokwi-serial-log
          path: wokwi-serial.log
